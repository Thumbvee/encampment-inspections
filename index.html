<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 MNWG Encampment Inspection Entry</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@600;700&display=swap');
  :root {
    --bg: #0d1b2e;
    --card-bg: #1a3550;
    --header-bg: #071018;
    --accent: #7ab3d4;
    --accent-dark: #7ab3d4;
    --text: #c8dff0;
    --text-dim: #7ab3d4;
    --border: #2a5070;
    --pass: #2e9e6e; --pass-dim: #1e7a52; --pass-bg: #112e1e;
    --fail: #c94030; --fail-dim: #8b1e14; --fail-bg: #2e1410;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; padding-bottom: 80px; }

  /* HEADER */
  .header { background: var(--header-bg); border-bottom: 1px solid #1e3a55; padding: 18px 20px 14px; text-align: center; position: sticky; top: 0; z-index: 100; }
  .header-inner { display: flex; align-items: center; justify-content: center; gap: 14px; }
  .header img { height: 54px; width: auto; }
  .header-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 4px; color: #9ecae1; text-transform: uppercase; margin-bottom: 4px; }
  .header-title { font-family: 'Barlow Condensed', sans-serif; font-size: 22px; font-weight: 700; letter-spacing: 2px; color: #ffffff; text-transform: uppercase; }

  /* CHANGE BUTTON — small, top right */
  .change-btn-wrap { position: absolute; top: 50%; right: 16px; transform: translateY(-50%); }
  .change-btn {
    background: transparent;
    border: 1px solid #2a5070;
    color: #7ab3d4;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
    display: none;
  }
  .change-btn:active { border-color: #7ab3d4; }

  /* SCREENS */
  .screen { display: none; }
  .screen.active { display: block; }

  /* LANDING */
  #landing { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; height: 100dvh; padding: 20px; background: var(--bg); overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
  #landing.active { display: flex; }

  .landing-patch { width: 80px; height: 80px; object-fit: contain; margin-bottom: 12px; }
  .landing-title { font-family: 'Barlow Condensed', sans-serif; font-size: 26px; font-weight: 700; letter-spacing: 2px; color: #fff; text-transform: uppercase; text-align: center; line-height: 1.2; margin-bottom: 20px; }
  .landing-sub { display: none; }

  .field-label { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 4px; color: var(--accent-dark); text-transform: uppercase; padding: 8px 0 6px; margin-bottom: 8px; margin-top: 0; display: block; }

  .select-wrapper { position: relative; }
  .select-wrapper::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--accent); font-size: 1rem; pointer-events: none; }
  select.insp-select {
    width: 100%;
    background: var(--card-bg);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 15px;
    padding: 11px 40px 11px 12px;
    border-radius: 8px;
    outline: none;
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  select.insp-select:focus { border-color: var(--accent); }
  select.insp-select option { background: var(--card-bg); }

  .btn-start {
    width: 100%;
    background: #1a3550;
    color: #c8dff0;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    padding: 14px;
    border: 1.5px solid #2a5070;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 12px;
    transition: background 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-start:hover { background: #224466; }

  .landing-form { width: 100%; max-width: 420px; }

  /* FORM BODY */
  .form-body { max-width: 520px; margin: 0 auto; padding: 20px 16px; }
  .section-header { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 4px; color: var(--accent-dark); text-transform: uppercase; padding: 8px 0 6px; margin-bottom: 12px; margin-top: 24px; }

  input[type="text"] { width: 100%; background: var(--card-bg); border: 1.5px solid var(--border); color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; padding: 10px 12px; border-radius: 8px; outline: none; transition: border-color 0.15s; }
  input[type="text"]:focus { border-color: var(--accent); }
  input[type="text"].error { border-color: var(--fail) !important; }

  /* ITEM CARDS */
  .item-card { background: var(--card-bg); border: 1.5px solid var(--border); border-radius: 10px; margin-bottom: 8px; padding: 14px 14px 12px; }
  .item-name { font-size: 17px; font-weight: 600; color: #e8f4fc; text-align: center; margin-bottom: 10px; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .toggle-btn { font-family: 'Barlow Condensed', sans-serif; font-size: 16px; font-weight: 700; letter-spacing: 1px; padding: 12px; border-radius: 7px; border: 2px solid transparent; cursor: pointer; transition: all 0.12s; background: transparent; text-transform: uppercase; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .toggle-btn.pass { color: #6dd4a0; border-color: #3aaa72; background: var(--pass-bg); }
  .toggle-btn.pass:hover { background: #1a4030; }
  .toggle-btn.pass.active { background: var(--pass); border-color: var(--pass-dim); color: #fff; }
  .toggle-btn.fail { color: #f07060; border-color: #c94030; background: var(--fail-bg); }
  .toggle-btn.fail:hover { background: #3d1a10; }
  .toggle-btn.fail.active { background: var(--fail); border-color: var(--fail-dim); color: #fff; }

  /* SUBMIT / NEW */
  .submit-btn { width: 100%; background: #1a3550; color: #c8dff0; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; padding: 14px; border: 1.5px solid #2a5070; border-radius: 8px; cursor: pointer; margin-top: 28px; transition: background 0.15s; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
  .submit-btn:hover { background: #224466; }
  .submit-btn:disabled { background: #112236; color: #4a7a9b; cursor: not-allowed; }
  .new-btn { width: 100%; background: transparent; color: #7ab3d4; font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 3px; text-transform: uppercase; padding: 14px; border: 2px solid #2a5070; border-radius: 8px; cursor: pointer; margin-top: 12px; transition: all 0.15s; display: none; touch-action: manipulation; }
  .new-btn:hover { background: #1a3550; color: #c8dff0; }

  /* STATUS */
  .status-msg { display: none; text-align: center; padding: 14px; border-radius: 8px; margin-top: 14px; font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 2px; font-weight: 700; }
  .status-msg.success { background: #112e1e; color: #6dd4a0; border: 1.5px solid #3aaa72; }
  .status-msg.error { background: #2e1410; color: #f07060; border: 1.5px solid #c94030; }

  /* WARNINGS */
  .val-warning { display: none; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #f07060; letter-spacing: 1px; margin-top: 10px; padding: 8px 10px; background: #2e1410; border-left: 2px solid #c94030; border-radius: 2px; }
  .capid-warning { display: none; font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; color: #f07060; text-transform: uppercase; margin-top: 5px; }

  /* NAME BANNER */
  .name-banner { display: none; background: #112e1e; border: 1.5px solid #3aaa72; border-radius: 8px; padding: 12px 16px; margin-top: 12px; align-items: center; gap: 10px; }
  .name-banner-check { color: #2e9e6e; font-size: 16px; }
  .name-banner-label { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 3px; color: #3aaa72; text-transform: uppercase; margin-bottom: 2px; }
  .name-banner-text { font-family: 'Barlow Condensed', sans-serif; font-size: 17px; font-weight: 700; letter-spacing: 1px; color: #6dd4a0; text-transform: uppercase; }

  /* QUEUE NOTICE */
  .queue-notice { display: none; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: #f07060; letter-spacing: 1px; margin-top: 10px; padding: 8px 10px; background: #2e1410; border-left: 2px solid #c94030; border-radius: 2px; }
  .queue-notice.visible { display: block; }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header" style="position:relative; display:none;" id="main-header">
  <div class="header-inner">
    <img src="patch.png" alt="MNWG patch" onerror="this.style.display='none'">
    <div>
      <div class="header-label">Minnesota Wing · CAP</div>
      <div class="header-title" id="header-title">2026 Encampment Inspections</div>
    </div>
  </div>
  <div class="change-btn-wrap">
    <button class="change-btn" id="change-btn" onclick="goToLanding()">↩ Change</button>
  </div>
</div>

<!-- LANDING -->
<div id="landing" class="screen active">
  <img src="patch.png" alt="MNWG Encampment patch" class="landing-patch" onerror="this.style.display='none'">
  <div class="landing-title">2026 MNWG Encampment<br>Inspection Entry</div>
  <div class="landing-sub">Minnesota Wing · Civil Air Patrol</div>
  <div class="landing-form">
    <label class="field-label" for="insp-select">Select Inspection</label>
    <div class="select-wrapper">
      <select class="insp-select" id="insp-select">
        <option value="" disabled selected>— Choose inspection —</option>
      </select>
    </div>
    <button class="btn-start" onclick="startInspection()">Begin Inspection</button>
  </div>
</div>

<!-- FORM -->
<div id="form-screen" class="screen">
  <div class="form-body">
    <div style="margin-bottom:14px; margin-top:20px;">
      <label class="field-label" style="margin-top:0;">CAPID</label>
      <input type="text" id="capid" placeholder="e.g. 732799" inputmode="numeric" oninput="checkCapid()">
      <div class="capid-warning" id="capidWarning">⚠ CAPID does not match any registered cadet</div>
      <div class="name-banner" id="nameBanner">
        <div class="name-banner-check">✓</div>
        <div>
          <div class="name-banner-label">Now Inspecting</div>
          <div class="name-banner-text" id="nameBannerText"></div>
        </div>
      </div>
    </div>

    <div id="uniform-section"></div>
    <div id="locker-section"></div>
    <div id="bunk-section"></div>

    <div class="val-warning" id="valWarning"></div>
    <div class="queue-notice" id="queueNotice"></div>

    <button class="submit-btn" id="submitBtn" onclick="submitForm()">Submit Inspection</button>
    <button class="new-btn" id="newBtn" onclick="resetForm()">Begin New Inspection</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// CONFIGURATION
// ─────────────────────────────────────────────

const APPS_SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

const INSPECTIONS = [
  { id: 1, name: 'Inspection 1', type: 'utility' },
  { id: 2, name: 'Inspection 2', type: 'utility' },
  { id: 3, name: 'Inspection 3', type: 'utility' },
  { id: 4, name: 'Inspection 4', type: 'blues'   },
  { id: 5, name: 'Inspection 5', type: 'blues'   },
];

// Populate when roster is available: { "123456": "Doe, John A." }
const ROSTER = {};

// ─────────────────────────────────────────────
// INSPECTION ITEMS
// ─────────────────────────────────────────────

const SECTIONS_UTILITY = {
  uniform:  ['Cover','Hair','Cleanliness','Blouse','Insignia','Patches / Tapes','Badges','Trousers','Belt','Footwear','Posting'],
  locker:   ['Locker','Cover (Foot Locker)','Hangers','Towel','Uniform (Hung)','PTs'],
  bunk:     ['Sheet','Cuff','Blanket','Hospital Corners','Pillow','Mattress','Bed Frame','Canteen','Luggage','Footwear (Bunk)']
};

const SECTIONS_BLUES = {
  uniform:  ['Cover','Hair','Cleanliness','Shirt','Insignia','Plates / Ribbons','Badges','Trousers / Slacks / Skirt','Belt','Footwear','Posting'],
  locker:   ['Locker','Cover (Foot Locker)','Hangers','Towel','Uniform (Hung)','PTs'],
  bunk:     ['Sheet','Cuff','Blanket','Hospital Corners','Pillow','Mattress','Bed Frame','Canteen','Luggage','Footwear (Bunk)']
};

const SECTION_LABELS = {
  uniform:  'Uniform',
  locker:   'Foot Locker',
  bunk:     'Bunk'
};

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let currentInspection = null;
let scores = {};
let allItems = [];
let offlineQueue = [];

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
function init() {
  const sel = document.getElementById('insp-select');
  INSPECTIONS.forEach(insp => {
    const opt = document.createElement('option');
    opt.value = insp.id;
    opt.textContent = `${insp.name} — ${insp.type === 'utility' ? 'Utility' : 'Blues'}`;
    sel.appendChild(opt);
  });
  window.addEventListener('online', flushQueue);
  setInterval(() => { if (offlineQueue.length > 0 && navigator.onLine) flushQueue(); }, 15000);
}

function startInspection() {
  const sel = document.getElementById('insp-select');
  const id = parseInt(sel.value);
  if (!id) return;
  const insp = INSPECTIONS.find(i => i.id === id);
  if (!insp) return;
  document.body.style.overflow = '';
  currentInspection = insp;
  document.getElementById('main-header').style.display = 'block';
  document.getElementById('header-title').textContent = insp.name;
  document.getElementById('change-btn').style.display = 'block';
  buildForm(insp.type === 'utility' ? SECTIONS_UTILITY : SECTIONS_BLUES);
  showScreen('form-screen');
}

function goToLanding() {
  document.body.style.overflow = 'hidden';
  showScreen('landing');
  document.getElementById('main-header').style.display = 'none';
  document.getElementById('change-btn').style.display = 'none';
  document.getElementById('header-title').textContent = '2026 Encampment Inspections';
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ─────────────────────────────────────────────
// FORM BUILDER
// ─────────────────────────────────────────────
function buildForm(sections) {
  scores = {};
  allItems = [];

  ['uniform','locker','bunk'].forEach(key => {
    const container = document.getElementById(key + '-section');
    container.innerHTML = '';
    const items = sections[key];

    const header = document.createElement('div');
    header.className = 'section-header';
    header.textContent = SECTION_LABELS[key];
    container.appendChild(header);

    items.forEach(item => {
      const id = slug(item);
      scores[id] = null;
      allItems.push(item);

      const card = document.createElement('div');
      card.className = 'item-card';
      card.id = 'card_' + id;
      card.innerHTML = `
        <div class="item-name">${item}</div>
        <div class="btn-row">
          <button class="toggle-btn pass" onclick="setItem('${id}','PASS',this)">Pass</button>
          <button class="toggle-btn fail" onclick="setItem('${id}','FAIL',this)">Fail</button>
        </div>`;
      container.appendChild(card);
    });
  });

  // Reset submit area
  document.getElementById('submitBtn').style.display = 'block';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'Submit Inspection';
  document.getElementById('newBtn').style.display = 'none';
  document.getElementById('statusMsg').style.display = 'none';
  document.getElementById('valWarning').style.display = 'none';
}

function setItem(id, value, btn) {
  scores[id] = value;
  const card = document.getElementById('card_' + id);
  card.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  // Auto-scroll to next unscored item
  const remaining = allItems.filter(item => !scores[slug(item)]);
  if (remaining.length > 0) {
    const next = document.getElementById('card_' + slug(remaining[0]));
    if (next) setTimeout(() => next.scrollIntoView({ behavior: 'smooth', block: 'center' }), 150);
  }
}

function slug(str) { return str.replace(/[^a-zA-Z0-9]/g, '_'); }

// ─────────────────────────────────────────────
// CAPID
// ─────────────────────────────────────────────
function checkCapid() {
  const val = document.getElementById('capid').value.trim();
  const warning = document.getElementById('capidWarning');
  const banner = document.getElementById('nameBanner');
  const bannerText = document.getElementById('nameBannerText');
  if (val.length >= 6) {
    const cadet = ROSTER[Number(val)] || ROSTER[val];
    if (cadet) {
      warning.style.display = 'none';
      bannerText.textContent = Array.isArray(cadet) ? cadet[0] + ', ' + cadet[1] : cadet;
      banner.style.display = 'flex';
    } else {
      banner.style.display = 'none';
      warning.style.display = 'block';
    }
  } else {
    warning.style.display = 'none';
    banner.style.display = 'none';
  }
}

// ─────────────────────────────────────────────
// OFFLINE QUEUE
// ─────────────────────────────────────────────
function updateQueueNotice() {
  const el = document.getElementById('queueNotice');
  if (offlineQueue.length > 0) {
    el.textContent = `⏳ ${offlineQueue.length} submission(s) queued — will send when connection restored`;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
}

function sendPayload(payload) {
  if (APPS_SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
    console.log('[DEV] Payload:', JSON.stringify(payload, null, 2));
    return Promise.resolve();
  }
  return fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    mode: 'no-cors',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
}

async function flushQueue() {
  while (offlineQueue.length > 0 && navigator.onLine) {
    try {
      await sendPayload(offlineQueue[0]);
      offlineQueue.shift();
      updateQueueNotice();
    } catch { break; }
  }
}

// ─────────────────────────────────────────────
// SUBMIT
// ─────────────────────────────────────────────
function submitForm() {
  const capid = document.getElementById('capid').value.trim();
  const warning = document.getElementById('valWarning');
  const missing = allItems.filter(item => !scores[slug(item)]);

  if (!capid) {
    warning.textContent = '⚠ Enter a CAPID before submitting.';
    warning.style.display = 'block';
    return;
  }
  if (missing.length > 0) {
    warning.textContent = `⚠ ${missing.length} item(s) not scored: ${missing.join(', ')}`;
    warning.style.display = 'block';
    return;
  }
  warning.style.display = 'none';

  const btn = document.getElementById('submitBtn');
  const statusMsg = document.getElementById('statusMsg');
  btn.disabled = true;
  btn.textContent = 'Submitting...';

  const cadetRaw = ROSTER[Number(capid)] || ROSTER[capid];
  const cadetName = Array.isArray(cadetRaw) ? cadetRaw[0] + ', ' + cadetRaw[1] : (cadetRaw || '');

  const payload = {
    timestamp: new Date().toISOString(),
    inspection: currentInspection.name,
    type: currentInspection.type,
    capid,
    cadet_name: cadetName,
  };
  allItems.forEach(item => { payload[item] = scores[slug(item)]; });

  if (!navigator.onLine) {
    offlineQueue.push(payload);
    updateQueueNotice();
    statusMsg.textContent = '⚠ No connection — inspection queued';
    statusMsg.className = 'status-msg error';
    statusMsg.style.display = 'block';
    btn.style.display = 'none';
    document.getElementById('newBtn').style.display = 'block';
    window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    return;
  }

  sendPayload(payload)
    .then(() => {
      if (offlineQueue.length > 0) flushQueue();
      statusMsg.textContent = '✓ Inspection submitted';
      statusMsg.className = 'status-msg success';
      statusMsg.style.display = 'block';
      btn.style.display = 'none';
      document.getElementById('newBtn').style.display = 'block';
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    })
    .catch(() => {
      offlineQueue.push(payload);
      updateQueueNotice();
      statusMsg.textContent = '⚠ No connection — inspection queued';
      statusMsg.className = 'status-msg error';
      statusMsg.style.display = 'block';
      btn.style.display = 'none';
      document.getElementById('newBtn').style.display = 'block';
      window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    });
}

function resetForm() {
  document.getElementById('capid').value = '';
  document.getElementById('capidWarning').style.display = 'none';
  document.getElementById('nameBanner').style.display = 'none';
  Object.keys(scores).forEach(k => delete scores[k]);
  document.querySelectorAll('.item-card .toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('statusMsg').style.display = 'none';
  document.getElementById('submitBtn').style.display = 'block';
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = 'Submit Inspection';
  document.getElementById('newBtn').style.display = 'none';
  document.getElementById('valWarning').style.display = 'none';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.addEventListener('DOMContentLoaded', () => {
  document.body.style.overflow = 'hidden';
  init();
});
</script>

     Deploy as Web App (Execute as: Me, Access: Anyone) →
     copy the Web App URL into APPS_SCRIPT_URL above.

const SHEET_MAP = {
  'Inspection 1': 'Raw_Inspection1',
  'Inspection 2': 'Raw_Inspection2',
  'Inspection 3': 'Raw_Inspection3',
  'Inspection 4': 'Raw_Inspection4',
  'Inspection 5': 'Raw_Inspection5',
};

function doPost(e) {
  try {
    const data = JSON.parse(e.postData.contents);
    const ss = SpreadsheetApp.getActiveSpreadsheet();
    const sheetName = SHEET_MAP[data.inspection] || 'Raw_Unmatched';
    let sheet = ss.getSheetByName(sheetName);
    if (!sheet) sheet = ss.insertSheet(sheetName);
    const keys = Object.keys(data);
    if (sheet.getLastRow() === 0) sheet.appendRow(keys);
    sheet.appendRow(keys.map(k => data[k]));
    return ContentService
      .createTextOutput(JSON.stringify({ status: 'ok' }))
      .setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService
      .createTextOutput(JSON.stringify({ status: 'error', message: err.toString() }))
      .setMimeType(ContentService.MimeType.JSON);
  }
}

function doGet() {
  return ContentService.createTextOutput('Inspection endpoint active.');
}
